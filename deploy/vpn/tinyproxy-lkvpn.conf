# tinyproxy config for the LinkedIn MCP split-tunnel.
#
# Runs INSIDE the lkvpn network namespace (started by linkedin-vpn-up.sh via
# `ip netns exec lkvpn tinyproxy -c ...`). It binds the namespace end of the
# veth (10.200.0.2) so the MCP's Chromium in the root ns can reach it at
# http://10.200.0.2:8888; its own upstream fetches then egress through wg0 ->
# the university (145.x). Only the veth /24 is allowed to connect.

Port 8888
Listen 10.200.0.2
Allow 10.200.0.0/24

Timeout 600
MaxClients 50
LogLevel Info
PidFile "/run/tinyproxy-lkvpn.pid"
